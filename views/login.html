<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — NagarVaani</title>
<link rel="stylesheet" href="/CSS/navbar.css">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;600&display=swap');

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

:root {
  --neon-blue: #00d4ff;
  --neon-purple: #7c3aed;
  --neon-pink: #ec4899;
  --neon-green: #10b981;
  --glass-bg: rgba(255, 255, 255, 0.04);
  --glass-border: rgba(255, 255, 255, 0.08);
  --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.37);
  --text-primary: #f0f4ff;
  --text-muted: rgba(240, 244, 255, 0.5);
  --input-bg: rgba(255, 255, 255, 0.04);
  --input-border: rgba(255, 255, 255, 0.1);
  --input-focus: rgba(0, 212, 255, 0.5);
}

body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #050510;
  overflow: hidden;
  position: relative;
}

/* ===== PARTICLE CANVAS ===== */
#particleCanvas {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: 0;
  pointer-events: none;
}

/* ===== ANIMATED GRADIENT ORBS ===== */
.orb {
  position: fixed;
  border-radius: 50%;
  filter: blur(80px);
  opacity: 0.35;
  z-index: 0;
  pointer-events: none;
  animation: orbFloat 20s ease-in-out infinite;
}
.orb-1 {
  width: 600px;
  height: 600px;
  background: radial-gradient(circle, var(--neon-purple), transparent);
  top: -200px;
  left: -200px;
  animation-delay: 0s;
}
.orb-2 {
  width: 500px;
  height: 500px;
  background: radial-gradient(circle, var(--neon-blue), transparent);
  bottom: -150px;
  right: -150px;
  animation-delay: -7s;
}
.orb-3 {
  width: 400px;
  height: 400px;
  background: radial-gradient(circle, var(--neon-pink), transparent);
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  animation-delay: -14s;
  opacity: 0.15;
}

@keyframes orbFloat {
  0%, 100% { transform: translate(0, 0) scale(1); }
  25% { transform: translate(30px, -40px) scale(1.05); }
  50% { transform: translate(-20px, 20px) scale(0.95); }
  75% { transform: translate(40px, 30px) scale(1.02); }
}

/* ===== GRID OVERLAY ===== */
.grid-overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: 0;
  pointer-events: none;
  background-image: 
    linear-gradient(rgba(0, 212, 255, 0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0, 212, 255, 0.03) 1px, transparent 1px);
  background-size: 60px 60px;
}

/* ===== SCANNER LINE ===== */
.scanner-line {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 2px;
  z-index: 0;
  background: linear-gradient(90deg, transparent, var(--neon-blue), transparent);
  opacity: 0.4;
  animation: scanMove 4s linear infinite;
  pointer-events: none;
}
@keyframes scanMove {
  0% { top: 0; opacity: 0; }
  10% { opacity: 0.5; }
  90% { opacity: 0.5; }
  100% { top: 100%; opacity: 0; }
}

/* ===== NAV STYLES ===== */
.login-nav {
  position: fixed;
  top: 28px;
  left: 40px;
  z-index: 100;
  display: flex;
  align-items: center;
  gap: 16px;
  animation: fadeInDown 0.8s ease forwards;
  opacity: 0;
}
.login-nav .brand-mark {
  width: 40px;
  height: 40px;
  border-radius: 12px;
  background: linear-gradient(135deg, var(--neon-purple), var(--neon-blue));
  display: grid;
  place-items: center;
  font-weight: 800;
  font-size: 1rem;
  color: #fff;
  box-shadow: 0 0 30px rgba(124, 58, 237, 0.3);
}
.login-nav .brand-text {
  display: flex;
  flex-direction: column;
  line-height: 1.1;
}
.login-nav .brand-text strong {
  font-size: 0.95rem;
  color: var(--text-primary);
  letter-spacing: 0.02em;
}
.login-nav .brand-text span {
  font-size: 0.7rem;
  color: var(--text-muted);
}
.login-nav .back-link {
  margin-left: 12px;
  padding: 6px 16px;
  border-radius: 999px;
  border: 1px solid var(--glass-border);
  color: var(--text-muted);
  text-decoration: none;
  font-size: 0.8rem;
  transition: all 0.3s ease;
}
.login-nav .back-link:hover {
  border-color: var(--neon-blue);
  color: var(--neon-blue);
  box-shadow: 0 0 20px rgba(0, 212, 255, 0.15);
}

/* ===== LOGIN CONTAINER ===== */
.login-wrapper {
  position: relative;
  z-index: 1;
  width: 100%;
  max-width: 440px;
  padding: 20px;
  animation: fadeInUp 0.9s ease forwards;
  opacity: 0;
  animation-delay: 0.2s;
}

@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(30px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes fadeInDown {
  from { opacity: 0; transform: translateY(-20px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ===== GLASS CARD ===== */
.login-card {
  background: var(--glass-bg);
  backdrop-filter: blur(40px) saturate(1.4);
  -webkit-backdrop-filter: blur(40px) saturate(1.4);
  border: 1px solid var(--glass-border);
  border-radius: 28px;
  padding: 48px 36px 40px;
  box-shadow: 
    var(--glass-shadow),
    inset 0 1px 0 rgba(255, 255, 255, 0.06);
  position: relative;
  overflow: hidden;
  transition: transform 0.4s ease, box-shadow 0.4s ease;
}

.login-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--neon-blue), var(--neon-purple), transparent);
  opacity: 0.6;
}

.login-card:hover {
  transform: translateY(-2px);
  box-shadow: 
    var(--glass-shadow),
    0 0 60px rgba(124, 58, 237, 0.08),
    inset 0 1px 0 rgba(255, 255, 255, 0.08);
}

/* ===== CARD DECORATIVE ELEMENTS ===== */
.card-glow {
  position: absolute;
  width: 200px;
  height: 200px;
  border-radius: 50%;
  filter: blur(60px);
  pointer-events: none;
  opacity: 0.12;
}
.card-glow-1 {
  background: var(--neon-purple);
  top: -60px;
  right: -60px;
}
.card-glow-2 {
  background: var(--neon-blue);
  bottom: -80px;
  left: -80px;
}

/* ===== HEADER ===== */
.login-header {
  text-align: center;
  margin-bottom: 36px;
  position: relative;
}
.login-header .icon-box {
  width: 72px;
  height: 72px;
  border-radius: 20px;
  margin: 0 auto 20px;
  background: linear-gradient(135deg, rgba(124, 58, 237, 0.2), rgba(0, 212, 255, 0.15));
  border: 1px solid rgba(255, 255, 255, 0.08);
  display: grid;
  place-items: center;
  font-size: 2rem;
  position: relative;
  overflow: hidden;
  animation: pulseGlow 3s ease-in-out infinite;
}
.icon-box::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, transparent 40%, rgba(255,255,255,0.05) 50%, transparent 60%);
  animation: shimmer 3s ease-in-out infinite;
}
@keyframes shimmer {
  0% { transform: translateX(-100%); }
  100% { transform: translateX(100%); }
}
@keyframes pulseGlow {
  0%, 100% { box-shadow: 0 0 20px rgba(124, 58, 237, 0.15); }
  50% { box-shadow: 0 0 40px rgba(0, 212, 255, 0.2); }
}

.login-header h1 {
  font-size: 1.6rem;
  font-weight: 700;
  color: var(--text-primary);
  letter-spacing: -0.02em;
}
.login-header p {
  color: var(--text-muted);
  font-size: 0.88rem;
  margin-top: 8px;
  font-weight: 400;
}

/* ===== FORM ===== */
.login-form {
  display: flex;
  flex-direction: column;
  gap: 20px;
}

/* ===== INPUT GROUP ===== */
.input-group {
  position: relative;
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.input-group label {
  font-size: 0.78rem;
  font-weight: 600;
  color: var(--text-muted);
  letter-spacing: 0.03em;
  text-transform: uppercase;
  padding-left: 4px;
}

.input-wrapper {
  position: relative;
  display: flex;
  align-items: center;
}

.input-wrapper .input-icon {
  position: absolute;
  left: 16px;
  font-size: 1.1rem;
  color: var(--text-muted);
  pointer-events: none;
  transition: color 0.3s ease;
  z-index: 2;
}

.input-wrapper input {
  width: 100%;
  padding: 16px 16px 16px 50px;
  background: var(--input-bg);
  border: 1px solid var(--input-border);
  border-radius: 14px;
  color: var(--text-primary);
  font-family: 'Inter', sans-serif;
  font-size: 0.95rem;
  font-weight: 500;
  outline: none;
  transition: all 0.35s ease;
  position: relative;
}

.input-wrapper input::placeholder {
  color: rgba(240, 244, 255, 0.2);
  font-weight: 400;
}

.input-wrapper input:hover {
  border-color: rgba(255, 255, 255, 0.18);
  background: rgba(255, 255, 255, 0.06);
}

.input-wrapper input:focus {
  border-color: var(--neon-blue);
  background: rgba(0, 212, 255, 0.04);
  box-shadow: 
    0 0 0 3px rgba(0, 212, 255, 0.08),
    0 0 30px rgba(0, 212, 255, 0.05);
}

.input-wrapper input:focus ~ .input-icon {
  color: var(--neon-blue);
}

/* ===== INPUT GLOW LINE ===== */
.input-glow {
  position: absolute;
  bottom: 0;
  left: 50%;
  width: 0;
  height: 2px;
  background: linear-gradient(90deg, var(--neon-blue), var(--neon-purple));
  border-radius: 0 0 14px 14px;
  transition: all 0.4s ease;
  transform: translateX(-50%);
  opacity: 0;
}
.input-wrapper input:focus ~ .input-glow {
  width: 80%;
  opacity: 1;
}

/* ===== PASSWORD TOGGLE ===== */
.toggle-password {
  position: absolute;
  right: 14px;
  background: none;
  border: none;
  color: var(--text-muted);
  font-size: 1.1rem;
  cursor: pointer;
  padding: 6px;
  border-radius: 8px;
  transition: all 0.25s ease;
  z-index: 2;
  display: flex;
  align-items: center;
  justify-content: center;
}
.toggle-password:hover {
  color: var(--neon-blue);
  background: rgba(0, 212, 255, 0.08);
}

/* ===== FORM OPTIONS ===== */
.form-options {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: 4px;
}

.remember-me {
  display: flex;
  align-items: center;
  gap: 10px;
  cursor: pointer;
  color: var(--text-muted);
  font-size: 0.85rem;
  font-weight: 500;
  user-select: none;
  transition: color 0.25s ease;
}
.remember-me:hover {
  color: var(--text-primary);
}

.remember-me input[type="checkbox"] {
  display: none;
}

.checkbox-custom {
  width: 20px;
  height: 20px;
  border-radius: 6px;
  border: 1.5px solid var(--input-border);
  background: rgba(255, 255, 255, 0.03);
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.3s ease;
  flex-shrink: 0;
}
.checkbox-custom svg {
  width: 12px;
  height: 12px;
  opacity: 0;
  transform: scale(0);
  transition: all 0.3s ease;
}
.remember-me input:checked + .checkbox-custom {
  background: linear-gradient(135deg, var(--neon-blue), var(--neon-purple));
  border-color: transparent;
  box-shadow: 0 0 20px rgba(0, 212, 255, 0.2);
}
.remember-me input:checked + .checkbox-custom svg {
  opacity: 1;
  transform: scale(1);
  color: #fff;
}

.forgot-link {
  color: var(--text-muted);
  text-decoration: none;
  font-size: 0.85rem;
  font-weight: 500;
  transition: all 0.25s ease;
  padding: 4px 8px;
  border-radius: 8px;
}
.forgot-link:hover {
  color: var(--neon-blue);
  background: rgba(0, 212, 255, 0.06);
}

/* ===== LOGIN BUTTON ===== */
.login-btn {
  position: relative;
  width: 100%;
  padding: 18px 28px;
  border: none;
  border-radius: 16px;
  font-family: 'Inter', sans-serif;
  font-size: 1rem;
  font-weight: 700;
  color: #fff;
  cursor: pointer;
  overflow: hidden;
  transition: all 0.4s ease;
  background: linear-gradient(135deg, var(--neon-purple), var(--neon-blue));
  box-shadow: 0 4px 20px rgba(124, 58, 237, 0.3);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  margin-top: 4px;
}

.login-btn::before {
  content: '';
  position: absolute;
  top: 0;
  left: -100%;
  width: 100%;
  height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.12), transparent);
  transition: left 0.6s ease;
}

.login-btn:not(:disabled):hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 40px rgba(124, 58, 237, 0.4);
}
.login-btn:not(:disabled):hover::before {
  left: 100%;
}

.login-btn:not(:disabled):active {
  transform: translateY(0);
  box-shadow: 0 4px 20px rgba(124, 58, 237, 0.3);
}

.login-btn:disabled {
  opacity: 0.6;
  cursor: not-allowed;
}

.btn-text {
  position: relative;
  z-index: 1;
  letter-spacing: 0.01em;
}

/* ===== LOADING SPINNER ===== */
.btn-spinner {
  width: 20px;
  height: 20px;
  border: 2.5px solid rgba(255,255,255,0.2);
  border-top-color: #fff;
  border-radius: 50%;
  animation: spin 0.6s linear infinite;
  display: none;
  position: relative;
  z-index: 1;
}
.login-btn.loading .btn-text { display: none; }
.login-btn.loading .btn-spinner { display: block; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ===== SUCCESS ANIMATION ===== */
.login-btn.success {
  background: linear-gradient(135deg, var(--neon-green), #059669);
  box-shadow: 0 4px 20px rgba(16, 185, 129, 0.3);
}
.login-btn.success .btn-text { display: none; }
.login-btn.success .btn-spinner { display: none; }
.login-btn.success::after {
  content: '✓';
  font-size: 1.3rem;
  position: relative;
  z-index: 1;
  animation: successPop 0.4s ease;
}
@keyframes successPop {
  0% { transform: scale(0); }
  50% { transform: scale(1.3); }
  100% { transform: scale(1); }
}

/* ===== DIVIDER ===== */
.divider {
  display: flex;
  align-items: center;
  gap: 16px;
  margin: 8px 0 4px;
}
.divider-line {
  flex: 1;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--glass-border), transparent);
}
.divider span {
  font-size: 0.78rem;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  font-weight: 500;
}

/* ===== SOCIAL BUTTONS ===== */
.social-login {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}

.social-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  padding: 14px;
  border-radius: 14px;
  border: 1px solid var(--glass-border);
  background: rgba(255, 255, 255, 0.03);
  color: var(--text-muted);
  font-family: 'Inter', sans-serif;
  font-size: 0.85rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.3s ease;
  text-decoration: none;
}
.social-btn:hover {
  border-color: rgba(255, 255, 255, 0.15);
  background: rgba(255, 255, 255, 0.06);
  color: var(--text-primary);
  transform: translateY(-1px);
}
.social-btn .social-icon {
  font-size: 1.2rem;
}

/* ===== FOOTER LINK ===== */
.login-footer {
  text-align: center;
  margin-top: 28px;
  color: var(--text-muted);
  font-size: 0.88rem;
}
.login-footer a {
  color: var(--neon-blue);
  text-decoration: none;
  font-weight: 600;
  transition: all 0.25s ease;
  position: relative;
}
.login-footer a::after {
  content: '';
  position: absolute;
  bottom: -2px;
  left: 0;
  width: 0;
  height: 1px;
  background: var(--neon-blue);
  transition: width 0.3s ease;
}
.login-footer a:hover::after {
  width: 100%;
}
.login-footer a:hover {
  text-shadow: 0 0 20px rgba(0, 212, 255, 0.3);
}

/* ===== ERROR MESSAGE ===== */
.error-message {
  background: rgba(239, 68, 68, 0.1);
  border: 1px solid rgba(239, 68, 68, 0.2);
  border-radius: 12px;
  padding: 12px 16px;
  color: #fca5a5;
  font-size: 0.85rem;
  font-weight: 500;
  display: none;
  align-items: center;
  gap: 10px;
  animation: shakeIn 0.4s ease;
}
.error-message.show {
  display: flex;
}
@keyframes shakeIn {
  0% { transform: translateX(-8px); opacity: 0; }
  25% { transform: translateX(8px); }
  50% { transform: translateX(-4px); }
  75% { transform: translateX(4px); }
  100% { transform: translateX(0); opacity: 1; }
}

/* ===== FLOATING SHAPES ===== */
.floating-shapes {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: 0;
  pointer-events: none;
  overflow: hidden;
}
.shape {
  position: absolute;
  border-radius: 50%;
  border: 1px solid rgba(255, 255, 255, 0.04);
  animation: shapeFloat 25s ease-in-out infinite;
}
.shape-1 {
  width: 80px;
  height: 80px;
  top: 15%;
  left: 8%;
  border-color: rgba(124, 58, 237, 0.12);
  animation-delay: 0s;
  animation-duration: 22s;
}
.shape-2 {
  width: 120px;
  height: 120px;
  top: 60%;
  left: 85%;
  border-color: rgba(0, 212, 255, 0.08);
  animation-delay: -5s;
  animation-duration: 28s;
}
.shape-3 {
  width: 50px;
  height: 50px;
  top: 75%;
  left: 10%;
  border-color: rgba(236, 72, 153, 0.1);
  animation-delay: -10s;
  animation-duration: 18s;
}
.shape-4 {
  width: 160px;
  height: 160px;
  top: 10%;
  left: 75%;
  border-color: rgba(16, 185, 129, 0.06);
  animation-delay: -15s;
  animation-duration: 30s;
}
@keyframes shapeFloat {
  0%, 100% { transform: translate(0, 0) rotate(0deg); }
  25% { transform: translate(40px, -30px) rotate(90deg); }
  50% { transform: translate(-20px, 40px) rotate(180deg); }
  75% { transform: translate(30px, 20px) rotate(270deg); }
}

/* ===== KEYBOARD SHORTCUT HINT ===== */
.kbd-hint {
  position: fixed;
  bottom: 28px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 1;
  color: rgba(240, 244, 255, 0.15);
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.7rem;
  letter-spacing: 0.04em;
  animation: fadeInUp 1s ease forwards;
  animation-delay: 1.5s;
  opacity: 0;
  display: flex;
  align-items: center;
  gap: 8px;
}
.kbd-hint kbd {
  padding: 3px 8px;
  border-radius: 4px;
  background: rgba(255, 255, 255, 0.04);
  border: 1px solid rgba(255, 255, 255, 0.06);
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.65rem;
}

/* ===== RESPONSIVE ===== */
@media (max-width: 600px) {
  .login-wrapper {
    padding: 12px;
  }
  .login-card {
    padding: 36px 24px 32px;
    border-radius: 22px;
  }
  .login-nav {
    top: 16px;
    left: 20px;
  }
  .login-nav .back-link {
    display: none;
  }
  .login-header h1 {
    font-size: 1.35rem;
  }
  .social-login {
    grid-template-columns: 1fr;
  }
  .form-options {
    flex-direction: column;
    gap: 12px;
    align-items: flex-start;
  }
}

@media (max-width: 400px) {
  .login-card {
    padding: 28px 18px 24px;
  }
  .input-wrapper input {
    padding: 14px 14px 14px 44px;
    font-size: 0.9rem;
  }
  .login-btn {
    padding: 16px 24px;
    font-size: 0.95rem;
  }
}
</style>
</head>
<body>

<!-- Background gradient orbs -->
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>

<!-- Grid overlay -->
<div class="grid-overlay"></div>

<!-- Scanner line -->
<div class="scanner-line"></div>

<!-- Floating shapes -->
<div class="floating-shapes">
  <div class="shape shape-1"></div>
  <div class="shape shape-2"></div>
  <div class="shape shape-3"></div>
  <div class="shape shape-4"></div>
</div>

<!-- Particle canvas -->
<canvas id="particleCanvas"></canvas>

<!-- Nav -->
<nav class="login-nav">
  <a href="/" style="display:flex;align-items:center;gap:14px;text-decoration:none;">
    <div class="brand-mark">N</div>
    <div class="brand-text">
      <strong>NagarVaani</strong>
      <span>citizen platform</span>
    </div>
  </a>

<!-- Particle system -->
<script>
// =============================
// PARTICLE SYSTEM
// =============================
(function() {
  const canvas = document.getElementById('particleCanvas');
  if (!canvas) return;
  
  const ctx = canvas.getContext('2d');
  let particles = [];
  let mouse = { x: null, y: null, radius: 120 };
  let animationId;
  
  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  
  window.addEventListener('resize', resize);
  resize();
  
  document.addEventListener('mousemove', (e) => {
    mouse.x = e.clientX;
    mouse.y = e.clientY;
  });
  
  class Particle {
    constructor() {
      this.x = Math.random() * canvas.width;
      this.y = Math.random() * canvas.height;
      this.size = Math.random() * 1.8 + 0.5;
      this.speedX = (Math.random() - 0.5) * 0.4;
      this.speedY = (Math.random() - 0.5) * 0.4;
      this.opacity = Math.random() * 0.5 + 0.1;
      this.hue = Math.random() > 0.5 ? 270 : 190; // purple or blue hue
    }
    
    update() {
      // Mouse interaction
      if (mouse.x !== null) {
        const dx = mouse.x - this.x;
        const dy = mouse.y - this.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < mouse.radius) {
          const force = (mouse.radius - dist) / mouse.radius;
          const dirX = dx / dist || 0;
          const dirY = dy / dist || 0;
          this.speedX -= dirX * force * 0.05;
          this.speedY -= dirY * force * 0.05;
        }
      }
      
      this.x += this.speedX;
      this.y += this.speedY;
      
      // Damping
      this.speedX *= 0.98;
      this.speedY *= 0.98;
      
      // Wrap around
      if (this.x < 0) this.x = canvas.width;
      if (this.x > canvas.width) this.x = 0;
      if (this.y < 0) this.y = canvas.height;
      if (this.y > canvas.height) this.y = 0;
    }
    
    draw() {
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
      ctx.fillStyle = this.hue === 270 
        ? `rgba(124, 58, 237, ${this.opacity})`
        : `rgba(0, 212, 255, ${this.opacity})`;
      ctx.fill();
    }
  }
  
  function init(count) {
    particles = [];
    for (let i = 0; i < count; i++) {
      particles.push(new Particle());
    }
  }
  
  function connectParticles() {
    const maxDist = 140;
    for (let a = 0; a < particles.length; a++) {
      for (let b = a + 1; b < particles.length; b++) {
        const dx = particles[a].x - particles[b].x;
        const dy = particles[a].y - particles[b].y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        
        if (dist < maxDist) {
          const opacity = 1 - (dist / maxDist);
          ctx.beginPath();
          ctx.moveTo(particles[a].x, particles[a].y);
          ctx.lineTo(particles[b].x, particles[b].y);
          ctx.strokeStyle = `rgba(124, 58, 237, ${opacity * 0.08})`;
          ctx.lineWidth = 0.6;
          ctx.stroke();
        }
      }
    }
  }
  
  function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    particles.forEach(p => {
      p.update();
      p.draw();
    });
    
    connectParticles();
    
    animationId = requestAnimationFrame(animate);
  }
  
  const count = Math.min(Math.floor(canvas.width * canvas.height / 12000), 100);
  init(count);
  animate();
  
  // Cleanup on page change
  window.addEventListener('beforeunload', () => {
    if (animationId) cancelAnimationFrame(animationId);
  });
})();
</script>

<!-- Login interactions -->
<script>
// =============================
// PASSWORD TOGGLE
// =============================
(function() {
  const toggleBtn = document.getElementById('togglePassword');
  const passwordInput = document.getElementById('password');
  if (toggleBtn && passwordInput) {
    toggleBtn.addEventListener('click', () => {
      const isPassword = passwordInput.getAttribute('type') === 'password';
      passwordInput.setAttribute('type', isPassword ? 'text' : 'password');
      toggleBtn.textContent = isPassword ? '🙈' : '👁️';
    });
  }
})();

// =============================
// FORM SUBMIT — enhanced login
// =============================
(function() {
  const loginForm = document.getElementById('loginForm');
  const loginBtn = document.getElementById('loginBtn');
  const errorMsg = document.getElementById('errorMessage');
  const errorText = document.getElementById('errorText');
  
  if (loginForm) {
    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      // Hide previous error
      errorMsg.classList.remove('show');
      
      // Show loading
      loginBtn.classList.add('loading');
      loginBtn.disabled = true;
      
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      
      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        
        const data = await res.json();
        
        // Brief delay for visual feedback
        await new Promise(r => setTimeout(r, 600));
        
        if (data.message === 'Login successful') {
          // Show success animation
          loginBtn.classList.remove('loading');
          loginBtn.classList.add('success');
          
          localStorage.setItem('isLoggedIn', 'true');
          localStorage.setItem('token', data.token);
          localStorage.setItem('user', JSON.stringify(data.user));
          
          // Navigate after success animation
          setTimeout(() => {
            window.location.href = '/dashboard';
          }, 500);
        } else {
          loginBtn.classList.remove('loading');
          loginBtn.disabled = false;
          
          // Show error
          errorText.textContent = data.message || 'Invalid credentials';
          errorMsg.classList.add('show');
          
          // Shake the card
          const card = document.querySelector('.login-card');
          card.style.animation = 'none';
          card.offsetHeight; // trigger reflow
          card.style.animation = 'shakeIn 0.4s ease';
        }
      } catch (err) {
        loginBtn.classList.remove('loading');
        loginBtn.disabled = false;
        
        errorText.textContent = 'Network error. Please try again.';
        errorMsg.classList.add('show');
        console.error('Login error:', err);
      }
    });
  }
})();

// =============================
// KEYBOARD SHORTCUT: Ctrl+Enter to submit
// =============================
document.addEventListener('keydown', (e) => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
    const form = document.getElementById('loginForm');
    if (form) form.requestSubmit();
  }
});
</script>
